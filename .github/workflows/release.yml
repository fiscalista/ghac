name: ghac release rehearsal

# Rehearsal pipeline for a Slack-driven release-approval flow:
# notify_start (informational) -> deploy_stub (paused by a custom
# deployment protection rule on the `staging` environment) -> notify_results.
# Triggered on releases.
#
# The Approve/Deny Slack message is posted by the receiver in response to
# GitHub's `deployment_protection_rule` webhook -- not by this workflow.
#
# Run by:
#   1. (one time) Install the receiver GitHub App on this repo and enable
#      it as a custom protection rule on Settings -> Environments -> staging.
#   2. Create a release on this repo (any tag like v0.0.1).
#   3. Watch the receiver console + Slack channel.

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  deployments: write
  id-token: write

jobs:
  notify_start:
    name: Notify Slack - Release Queued
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the vendored action)
        uses: actions/checkout@v4
      - name: Post Slack message - release queued
        uses: ./.github/actions/slack_notifier_api
        with:
          business_unit: 'rehearsal'
          environment: 'staging'
          region: 'local'
          branch: ${{ github.ref }}
          channel: ${{ vars.SLACK_CHANNEL }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          message_title: 'ghac rehearsal: Release Queued'
          message_body: "${{ format('<https://github.com/{0}> rehearsal release queued. Run <{1}/{0}/actions/runs/{2}|{2}>. The receiver will post an approval message when the deploy job reaches `staging`.', github.repository, github.server_url, github.run_id) }}"

  deploy_stub:
    name: Deploy (paused by custom protection rule)
    needs: notify_start
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Stub deploy step
        run: |
          echo "rehearsal: deployed sha $GITHUB_SHA at $(date)"

  notify_results:
    name: Notify Slack - Results
    needs: [deploy_stub]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the vendored action)
        uses: actions/checkout@v4
      - name: Post Slack message with final outcome
        uses: ./.github/actions/slack_notifier_api
        with:
          business_unit: 'rehearsal'
          environment: 'staging'
          region: 'local'
          branch: ${{ github.ref }}
          channel: ${{ vars.SLACK_CHANNEL }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          message_title: "${{ needs.deploy_stub.result == 'success' && 'ghac rehearsal: Release Succeeded' || 'ghac rehearsal: Release Failed' }}"
          message_body: "${{ format('Run <{0}/{1}/actions/runs/{2}|{2}> ended with result `{3}`.', github.server_url, github.repository, github.run_id, needs.deploy_stub.result) }}"
