name: ghac release rehearsal

# Rehearsal pipeline for the Slack-driven release-approval flow.
#
# All Slack messages are posted by the receiver, not by this workflow:
#   1. (one time) Install the receiver GitHub App on this repo and:
#        - enable it as a custom protection rule on Settings -> Environments -> staging
#        - subscribe the App webhook to: deployment_protection_rule + workflow_run
#   2. Create a release on this repo (any tag like v0.0.1) or trigger via
#      workflow_dispatch.
#   3. Watch the receiver console + Slack channel:
#        - "Awaiting Approval" message appears (deployment_protection_rule webhook)
#        - approver clicks Approve/Deny in Slack -> message updates in place
#        - "Release Succeeded/Failed" arrives as a *thread reply* under the
#          original message (workflow_run completion webhook)

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  deployments: write
  id-token: write

jobs:
  deploy_stub:
    name: Deploy (paused by custom protection rule)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Stub deploy step
        run: |
          echo "rehearsal: deployed sha $GITHUB_SHA at $(date)"
