name: ghac release rehearsal

# Rehearsal pipeline for a Slack-driven release-approval flow:
# notify_start -> deploy job paused on a protected GitHub Environment ->
# notify_results. Triggered on releases.
#
# Run by:
#   1. (one time) Settings -> Environments -> create `staging` and add
#      `<your-app-name>[bot]` as a Required Reviewer.
#   2. Create a release on this repo (any tag like v0.0.1).
#   3. Watch the receiver console + Slack channel.

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  deployments: write
  id-token: write

jobs:
  notify_start:
    name: Notify Slack - Awaiting Approval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the vendored action)
        uses: actions/checkout@v4
      - name: Post Slack message with Approve/Deny buttons
        uses: ./.github/actions/slack_notifier_api
        with:
          business_unit: 'rehearsal'
          environment: 'staging'
          region: 'local'
          branch: ${{ github.ref }}
          channel: ${{ vars.SLACK_CHANNEL }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          message_title: 'ghac rehearsal: Release Awaiting Approval'
          message_body: ${{ format('<https://github.com/{0}> rehearsal release. Run <{1}/{0}/actions/runs/{2}|{2}>. Click Approve below to release the staging deployment.', github.repository, github.server_url, github.run_id) }}
          render_approval_buttons: 'true'
          gh_run_id: ${{ github.run_id }}
          gh_environment: 'staging'
          approver_slack_user_ids: ${{ secrets.SLACK_RELEASE_APPROVER_IDS }}

  deploy_stub:
    name: Deploy (paused on Required Reviewers)
    needs: notify_start
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Stub deploy step
        run: |
          echo "rehearsal: deployed sha $GITHUB_SHA at $(date)"

  notify_results:
    name: Notify Slack - Results
    needs: [deploy_stub]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the vendored action)
        uses: actions/checkout@v4
      - name: Post Slack message with final outcome
        uses: ./.github/actions/slack_notifier_api
        with:
          business_unit: 'rehearsal'
          environment: 'staging'
          region: 'local'
          branch: ${{ github.ref }}
          channel: ${{ vars.SLACK_CHANNEL }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          message_title: ${{ needs.deploy_stub.result == 'success' && 'ghac rehearsal: Release Succeeded' || 'ghac rehearsal: Release Failed' }}
          message_body: ${{ format('Run <{0}/{1}/actions/runs/{2}|{2}> ended with result `{3}`.', github.server_url, github.repository, github.run_id, needs.deploy_stub.result) }}
